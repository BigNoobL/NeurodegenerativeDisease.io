<h2>Memory Path</h2>
<p>Watch the path light up, then repeat it.</p>

<div id="grid"></div>
<button onclick="start()">Start</button>

<script>

let seq=[]
let user=[]
const grid=document.getElementById("grid")

for(let i=0;i<9;i++){
let d=document.createElement("div")
d.style.width="60px"
d.style.height="60px"
d.style.border="1px solid black"
d.style.display="inline-block"
d.id=i
d.onclick=()=>clickTile(i)
grid.appendChild(d)
}

function start(){

seq=[]
user=[]

for(let i=0;i<4;i++)
seq.push(Math.floor(Math.random()*9))

show()

}

function show(){

seq.forEach((n,i)=>{

setTimeout(()=>{

document.getElementById(n).style.background="yellow"

setTimeout(()=>{

document.getElementById(n).style.background="white"

},400)

},i*700)

})

}

function clickTile(n){

user.push(n)

if(user[user.length-1]!=seq[user.length-1]){

alert("Try again")
user=[]

}

if(user.length==seq.length){

alert("Correct!")

}

}

</script>
